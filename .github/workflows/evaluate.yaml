name: Pwn-Request Evaluation Test (Authentic Sinks)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Dump author_association fields
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "comment.author_association=${{ github.event.comment.author_association }}"
          echo "issue.user=${{ github.event.issue.user.login }}"
          echo "issue.author_association=${{ github.event.issue.author_association }}"
          echo "pr.author=${{ github.event.pull_request.user.login }}"
          echo "pr.author_association=${{ github.event.pull_request.author_association }}"
  evaluate:
    if: |
      contains('["OWNER", "CONTRIBUTOR", "COLLABORATOR", "MEMBER"]', github.event.comment.author_association) &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/evaluate'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on pull request
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Starting evaluation setup (PoC)..."
            })

      - name: Checkout pull request
        # 🚨 危险源：在基础仓库的高权限上下文中，拉取了不受信任的 PR 代码
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          python-version: "3.11"

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        # 🚨 致命 Sink 1：npm 生命周期劫持
        run: |
          cd ./app/frontend
          npm install
          npm run build

      - name: Install dependencies
        # 🚨 致命 Sink 2：恶意依赖劫持
        run: |
          uv pip install -r requirements-dev.txt

      - name: Run local server in background
        # 🚨 致命 Sink 3：直接代码执行
        run: |
          cd app/backend
          RUNNER_TRACKING_ID="" && (nohup python3 -m quart --app main:app run --port 50505 > serverlogs.out 2> serverlogs.err &)
          
          # 辅助验证：等待几秒让后台进程执行，并打印日志以收集 RCE 证据
          sleep 5
          echo "=== Server Output ==="
          cat serverlogs.out || true
          cat serverlogs.err || true
